vision_node:
  ros__parameters:
    model_path: "/models/best_small.pt"
    # Lower if small/distant flame never registers (try 0.2–0.35). Brain uses its own threshold too.
    confidence_threshold: 0.25
    inference_imgsz: 512
    max_det: 3
    fire_only: true
    fire_class_name: "Fire"
    camera_width: 640
    camera_height: 480
    # Same as scripts/rpi_test_yolo_fire.py --video-mode (still stream is often stale in a timer loop).
    picamera_video_mode: true
    picamera_warmup_sec: 1.0
    # V4L fallback: optional preferred node (tried first), then every /dev/video* in numeric order.
    # Pinning only /dev/video0 often hits a non-capture node on Pi libcamera (STREAMON EINVAL).
    opencv_video_device: "/dev/video0"
    # If true, never use Picamera2 (same as env FIREBOT_OPENCV_ONLY=1).
    opencv_only: false
    # Match ~1–3 FPS on Pi + YOLO; brain motion is tuned for low-rate detections.
    detection_fps: 3.0
    # When true, publishes sensor_msgs/Image on /fire/debug_image (BGR, boxes) for
    # rqt_image_view / RViz on the Pi desktop. Set false on headless bots to save CPU.
    publish_debug_image: true

brain_node:
  ros__parameters:
    # --- detection ---
    # Should be <= vision_node confidence for the same bbox to count as "fire".
    confidence_threshold: 0.25
    stable_frames: 5
    center_offset_thresh: 0.08
    # Approach stop: fire centered and bbox_area in [min, max] (fraction of frame).
    approach_bbox_min_frac: 0.10
    approach_bbox_max_frac: 0.30
    # Require this many seconds in APPROACHING before the bbox gate can finish
    # (slow creep toward fire indoors).
    approach_gate_min_sec: 15.0

    # First SEARCHING phase: straight forward out of corner (no yaw), seconds / PWM.
    corner_exit_forward_sec: 2.0
    corner_exit_speed: 30.0

    # Low PWM for indoor + low vision FPS (see angular_scale on bridge).
    v_approach: 32.0
    kp_yaw: 50.0
    rotate_speed: 32.0
    search_timeout_sec: 45.0
    confirm_timeout_sec: 30.0
    warning_seconds: 5
    discharge_seconds: 6.0
    complete_hold_sec: 3.0

    approach_pulse_ms: 500
    approach_rest_ms: 700
    approach_max_sec: 60.0

    approach_strategy: "yolo_only"
    approach_distance_cm: 50
    safety_stop_cm: 20
    alarm_from_audio: false
    mic_alarm_threshold: 600
    mic_hold_ms: 500

# rotation_center_test_node — edit here for quick tuning (host-vision + rotation launch).
rotation_center_test:
  ros__parameters:
    fire_confirm_sec: 12.0
    pulse_rotate_sec: 0.25
    pulse_rest_sec: 0.35
    pulse_min_interval_sec: 5.0
    rotate_speed: 32.0
    # Middle fraction of frame width counts as centered (|x_offset| <= value). 0.75 ≈ middle 75%.
    center_band_frac: 0.75
    confidence_threshold: 0.25
    seek_rotation_sign: 1.0
    seek_alternate: true
    # ALIGN: hold still this long after flame lost before SEEK rotation (wait for re-detect).
    lost_fire_grace_sec: 5.0

arduino_bridge_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200
    sensor_poll_hz: 10.0
    # Slightly lower than default so moderate brain angular_z maps to gentle spin.
    angular_scale: 72.0
    enable_ultrasonic: false
    enable_ir: false
    enable_mic: false
