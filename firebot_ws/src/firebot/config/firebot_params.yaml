vision_node:
  ros__parameters:
    model_path: "/models/best_small.pt"
    # Lower if small/distant flame never registers (try 0.2–0.35). Brain uses its own threshold too.
    confidence_threshold: 0.25
    inference_imgsz: 512
    max_det: 3
    fire_only: true
    fire_class_name: "Fire"
    camera_width: 640
    camera_height: 480
    # Match ~1–3 FPS on Pi + YOLO; brain motion is tuned for low-rate detections.
    detection_fps: 3.0
    # When true, publishes sensor_msgs/Image on /fire/debug_image (BGR, boxes) for
    # rqt_image_view / RViz on the Pi desktop. Set false on headless bots to save CPU.
    publish_debug_image: true

brain_node:
  ros__parameters:
    # --- detection ---
    # Should be <= vision_node confidence for the same bbox to count as "fire".
    confidence_threshold: 0.25
    stable_frames: 5
    center_offset_thresh: 0.08
    # Approach stop: fire centered and bbox_area in [min, max] (fraction of frame).
    approach_bbox_min_frac: 0.10
    approach_bbox_max_frac: 0.30
    # Require this many seconds in APPROACHING before the bbox gate can finish
    # (slow creep toward fire indoors).
    approach_gate_min_sec: 15.0

    # First SEARCHING phase: straight forward out of corner (no yaw), seconds / PWM.
    corner_exit_forward_sec: 2.0
    corner_exit_speed: 30.0

    # Low PWM for indoor + low vision FPS (see angular_scale on bridge).
    v_approach: 32.0
    kp_yaw: 50.0
    rotate_speed: 32.0
    search_timeout_sec: 45.0
    confirm_timeout_sec: 30.0
    warning_seconds: 5
    discharge_seconds: 6.0
    complete_hold_sec: 3.0

    approach_pulse_ms: 500
    approach_rest_ms: 700
    approach_max_sec: 60.0

    approach_strategy: "yolo_only"
    approach_distance_cm: 50
    safety_stop_cm: 20
    alarm_from_audio: false
    mic_alarm_threshold: 600
    mic_hold_ms: 500

arduino_bridge_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200
    sensor_poll_hz: 10.0
    # Slightly lower than default so moderate brain angular_z maps to gentle spin.
    angular_scale: 72.0
    enable_ultrasonic: false
    enable_ir: false
    enable_mic: false
