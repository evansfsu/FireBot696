vision_node:
  ros__parameters:
    model_path: "/models/best.pt"
    confidence_threshold: 0.6
    inference_imgsz: 512
    max_det: 3
    fire_only: true
    fire_class_name: "Fire"
    camera_width: 640
    camera_height: 480
    detection_fps: 5.0

brain_node:
  ros__parameters:
    # --- detection ---
    confidence_threshold: 0.5
    stable_frames: 5
    center_offset_thresh: 0.08
    approach_bbox_thresh: 0.25

    # --- indoor-safe motion defaults ---
    # PWM values go straight to the Mega's skid-steer mix (after scaling
    # inside the bridge). Keep these small -- the robot lives in a room.
    v_approach: 60.0          # forward PWM during approach pulses
    kp_yaw: 90.0              # yaw P-gain (rad/s^-1 -> PWM)
    rotate_speed: 55.0        # in-place spin PWM during SEARCHING
    search_timeout_sec: 30.0
    confirm_timeout_sec: 30.0
    warning_seconds: 5
    discharge_seconds: 8.0
    complete_hold_sec: 3.0

    # --- approach behavior ---
    # APPROACHING pulses motion: drive for approach_pulse_ms, coast for
    # approach_rest_ms, then re-evaluate detection. That way the robot
    # crawls forward in visible ~1 ft steps, never sprints at a wall, and
    # teammates can clearly see each decision cycle. approach_max_sec is
    # the hard safety cap -- if the gate never trips, we abort to WARNING.
    approach_pulse_ms: 400
    approach_rest_ms: 600
    approach_max_sec: 20.0

    approach_strategy: "yolo_only"   # yolo_only | yolo_ultrasonic | yolo_ultrasonic_ir
    approach_distance_cm: 50
    safety_stop_cm: 20
    alarm_from_audio: false
    mic_alarm_threshold: 600
    mic_hold_ms: 500

arduino_bridge_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200
    sensor_poll_hz: 10.0
    angular_scale: 80.0
    # Optional sensors default off. Flip to `true` here (or send the same
    # command at runtime with `C,US,1` / `C,IR,1` / `C,MIC,1`) once the
    # corresponding hardware is mounted. With `enable_ultrasonic: true`
    # and `approach_strategy: yolo_ultrasonic`, the brain will respect
    # `safety_stop_cm` to avoid walls/obstacles during APPROACHING.
    enable_ultrasonic: false
    enable_ir: false
    enable_mic: false
