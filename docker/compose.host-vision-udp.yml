# Merge with docker-compose.yml — host Picamera + live window (rpi_test_yolo_fire.py) feeds Docker brain.
#
#   Terminal A (Pi, repo root, NO ROS required on host):
#     python3 scripts/rpi_test_yolo_fire.py --video-mode --udp-bridge 127.0.0.1:7766
#
#   Terminal B:
#     cd docker
#     docker compose -f docker-compose.yml -f compose.host-vision-udp.yml up -d --build
#
services:
  firebot:
    environment:
      - ROS_DOMAIN_ID=0
      - FIREBOT_OPENCV_ONLY=0
      - YOLO_CONFIG_DIR=/tmp/Ultralytics
      - FIREBOT_UDP_DETECTION_PORT=7766
