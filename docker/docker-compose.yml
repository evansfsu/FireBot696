services:
  firebot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    privileged: true
    ipc: host
    group_add:
      - video
      - dialout
    environment:
      - ROS_DOMAIN_ID=0
      # Explicit 0 overrides a host .env or shell export of FIREBOT_OPENCV_ONLY=1.
      - FIREBOT_OPENCV_ONLY=0
      - YOLO_CONFIG_DIR=/tmp/Ultralytics
      # Picamera2 path matches host rpi_test_yolo_fire; OpenCV/V4L is fallback only.
      # If vision still fails: docker compose -f docker/docker-compose.yml -f docker/compose.picam-sidecar.yml
    volumes:
      - ../models:/models
    devices:
      - /dev/video0:/dev/video0
      - /dev/media0:/dev/media0
      - /dev/media1:/dev/media1
      - /dev/v4l-subdev0:/dev/v4l-subdev0
      - /dev/v4l-subdev1:/dev/v4l-subdev1
      - /dev/ttyACM0:/dev/ttyACM0
    restart: unless-stopped
    command: ros2 launch firebot firebot.launch.py

  firebot-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    privileged: true
    ipc: host
    group_add:
      - video
      - dialout
    profiles:
      - dev
    environment:
      - ROS_DOMAIN_ID=0
      - FIREBOT_OPENCV_ONLY=0
      - YOLO_CONFIG_DIR=/tmp/Ultralytics
    volumes:
      - ../firebot_ws/src:/firebot_ws/src
      - ../models:/models
    devices:
      - /dev/video0:/dev/video0
      - /dev/media0:/dev/media0
      - /dev/media1:/dev/media1
      - /dev/v4l-subdev0:/dev/v4l-subdev0
      - /dev/v4l-subdev1:/dev/v4l-subdev1
      - /dev/ttyACM0:/dev/ttyACM0
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               cd /firebot_ws &&
               colcon build --symlink-install &&
               source install/setup.bash &&
               ros2 launch firebot firebot.launch.py"
