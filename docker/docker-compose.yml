services:
  firebot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    privileged: true
    ipc: host
    group_add:
      - video
    environment:
      - ROS_DOMAIN_ID=0
      # CSI cameras: host test uses Picamera2. Forcing OpenCV-only (FIREBOT_OPENCV_ONLY=1)
      # breaks if /dev/video* is missing or wrong inside the container. Leave unset so
      # vision_node tries Picamera2 first, then V4L. Or run host Picamera publisher:
      # FIREBOT_SKIP_VISION=1 + scripts/host_picam_yolo_publisher.py on the Pi.
    volumes:
      - ../models:/models
    devices:
      - /dev/video0:/dev/video0
      - /dev/media0:/dev/media0
      - /dev/media1:/dev/media1
      - /dev/v4l-subdev0:/dev/v4l-subdev0
      - /dev/v4l-subdev1:/dev/v4l-subdev1
      - /dev/ttyACM0:/dev/ttyACM0
    restart: unless-stopped
    command: ros2 launch firebot firebot.launch.py

  firebot-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    privileged: true
    ipc: host
    group_add:
      - video
    profiles:
      - dev
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ../firebot_ws/src:/firebot_ws/src
      - ../models:/models
    devices:
      - /dev/video0:/dev/video0
      - /dev/media0:/dev/media0
      - /dev/media1:/dev/media1
      - /dev/v4l-subdev0:/dev/v4l-subdev0
      - /dev/v4l-subdev1:/dev/v4l-subdev1
      - /dev/ttyACM0:/dev/ttyACM0
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               cd /firebot_ws &&
               colcon build --symlink-install &&
               source install/setup.bash &&
               ros2 launch firebot firebot.launch.py"
